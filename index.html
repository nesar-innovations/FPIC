<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPIC | Frictionless Planetary Induction Chamber</title>
    <style>
        :root {
            --bg-color: #05070a;
            --card-bg: #0d1117;
            --accent-blue: #00d4ff;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --glow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #0a192f 0%, #05070a 100%);
            border-bottom: 1px solid #30363d;
            padding: 0 20px;
        }

        .badge {
            display: inline-block;
            padding: 0.4rem 1rem;
            background: rgba(35, 134, 54, 0.2);
            color: #3fb950;
            border: 1px solid #238636;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hero-title {
            font-size: clamp(3rem, 10vw, 5rem);
            margin: 0;
            background: linear-gradient(180deg, #fff 0%, var(--accent-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .hero-subtitle {
            color: var(--text-dim);
            font-size: 1.2rem;
            max-width: 700px;
            margin-top: 1rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 5rem 2rem;
        }

        h2 {
            color: var(--accent-blue);
            font-size: 2rem;
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
            margin-top: 4rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid #30363d;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-blue);
            box-shadow: var(--glow);
        }

        .card h3 {
            color: var(--accent-blue);
            margin-top: 0;
            font-size: 1.4rem;
        }

        .logic-box {
            background: #0d1117;
            padding: 2.5rem;
            border-radius: 16px;
            border: 1px solid #30363d;
            margin-top: 3rem;
        }

        .step {
            display: flex;
            margin-bottom: 1.5rem;
            align-items: flex-start;
        }

        .step-num {
            background: var(--accent-blue);
            color: #000;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
